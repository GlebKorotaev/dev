apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "latin-square.fullname" . }}
  labels:
    {{- include "latin-square.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "latin-square.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "latin-square.selectorLabels" . | nindent 8 }}
      {{- if .Values.monitoring.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.metricsPort }}"
        prometheus.io/path: "/metrics"
      {{- end }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.port }}
          name: http
        - containerPort: {{ .Values.service.metricsPort }}
          name: metrics
        env:
        - name: METRICS_PORT
          value: {{ .Values.service.metricsPort | quote }}
        - name: HTTP_PORT
          value: {{ .Values.service.port | quote }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- if .Values.probes.enabled }}
        livenessProbe:
          exec:
            command: {{ .Values.probes.livenessCommand | toYaml | nindent 12 }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: {{ .Values.probes.readinessCommand | toYaml | nindent 12 }}
          initialDelaySeconds: 5
          periodSeconds: 5
        {{- end }}