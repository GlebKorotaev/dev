name: CI-CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: docker.io/gleb332/dev2

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential dpkg-dev gcc make

      - name: Run build script
        run: |
          chmod +x ci/*.sh
          ./ci/build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix
          path: out/matrix

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: matrix
          path: out

      - name: Make binary executable
        run: chmod +x out/matrix

      - name: Run test script
        run: |
          chmod +x ci/*.sh
          ./ci/test.sh ./out/matrix

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential dpkg-dev fakeroot

      - name: Run package script
        run: |
          chmod +x ci/*.sh
          ./ci/package.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix-deb
          path: dist/*.deb

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: matrix-deb
          path: dist

      - name: Build Docker image from .deb
        run: |
          set -euo pipefail
          ls -la dist
          docker build -t latin-square:ci .

      - name: Test Docker image - HTTP Server
        run: |
          # Запускаем контейнер с HTTP сервером в фоне
          docker run -d --name latin-square-test -p 8080:8080 latin-square:ci python3 /usr/bin/server.py
          sleep 5
          
          # Проверяем, что контейнер запущен
          if ! docker ps | grep -q latin-square-test; then
            echo "❌ Container failed to start"
            docker logs latin-square-test
            exit 1
          fi
          echo "✓ Container started successfully"
          
          # Тестируем health check
          echo "Testing health endpoint..."
          curl --fail http://localhost:8080/health || exit 1
          echo "✓ Health check passed"
          
          # Тестируем проверку латинского квадрата (валидный)
          echo "Testing valid Latin square..."
          echo "3
          1 2 3
          2 3 1
          3 1 2" | curl -X POST -d @- http://localhost:8080/check | grep -q "является латинским квадратом"
          echo "✓ Valid Latin square test passed"
          
          # Тестируем проверку латинского квадрата (невалидный)
          echo "Testing invalid Latin square..."
          echo "3
          1 2 2
          2 3 1
          3 1 2" | curl -X POST -d @- http://localhost:8080/check | grep -q "НЕ является латинским квадратом"
          echo "✓ Invalid Latin square test passed"
          
          # Тестируем метрики endpoint
          echo "Testing metrics endpoint..."
          curl --fail http://localhost:8080/metrics || exit 1
          echo "✓ Metrics endpoint test passed"
          
          # Останавливаем и удаляем контейнер
          docker stop latin-square-test
          docker rm latin-square-test
          echo "✅ All Docker tests passed successfully"

      - name: Publish image to Docker Hub (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION_TAG: ${{ github.ref_name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN are not set. Skipping Docker Hub push."
            exit 0
          fi
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
          docker tag latin-square:ci "${IMAGE_NAME}:${VERSION_TAG}"
          docker tag latin-square:ci "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${VERSION_TAG}"
          docker push "${IMAGE_NAME}:latest"
          echo "✅ Successfully published to Docker Hub: ${IMAGE_NAME}:${VERSION_TAG}"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: matrix-deb
          path: dist

      - name: Debug - List files
        run: |
          echo "Files in dist:"
          ls -la dist/
          
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          name: Release ${{ github.ref_name }}
          body: |
            ## Релиз ${{ github.ref_name }}
            
            ### Что нового:
            - Проверка матрицы на латинский квадрат
            - HTTP сервер для обработки запросов
            - Prometheus метрики для мониторинга
            - Docker образ доступен на Docker Hub: `docker pull gleb332/dev2:${{ github.ref_name }}`
            
            ### Установка и использование:
            
            **Deb пакет:**
            ```bash
            sudo dpkg -i latin-square_${{ github.ref_name }}_amd64.deb
            latin-square