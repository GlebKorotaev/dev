name: CI-CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: GlebKorotaev/dev2

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential dpkg-dev gcc make

      - name: Run build script
        run: |
          chmod +x ci/*.sh
          ./ci/build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix
          path: out/matrix

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: matrix
          path: out

      - name: Make binary executable
        run: chmod +x out/matrix

      - name: Run test script
        run: |
          chmod +x ci/*.sh
          ./ci/test.sh ./out/matrix

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential dpkg-dev fakeroot

      - name: Run package script
        run: |
          chmod +x ci/*.sh
          ./ci/package.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix-deb
          path: dist/*.deb

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: matrix-deb
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb