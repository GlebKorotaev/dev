apiVersion: apps/v1
kind: Deployment
metadata:
  name: latin-square
  namespace: default
  labels:
    app: latin-square
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: latin-square
  template:
    metadata:
      labels:
        app: latin-square
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: latin-square
        image: gleb332/dev2:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: METRICS_PORT
          value: "9090"
        - name: HTTP_PORT
          value: "8080"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - /usr/bin/matrix
            - --health
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /usr/bin/matrix
            - --ready
          initialDelaySeconds: 5
          periodSeconds: 5